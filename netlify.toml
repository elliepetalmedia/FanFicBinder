[build]
  command = "npm run build"
  functions = "functions"
  publish = "dist/public"

[functions]
  node_bundler = "esbuild"

# 1. Connect the Frontend (API) to the Backend (Function)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# 2. SPA Fallback (Prevents 404s on reload)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200